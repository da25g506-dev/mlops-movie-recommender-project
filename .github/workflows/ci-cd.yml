name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Lint with flake8
        run: flake8 src/ tests/ monitoring/ airflow/dags/ scripts/ spark_jobs/ streaming/ beam_jobs/

      - name: Run unit tests
        run: pytest tests/ -v

  docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install downloader dependencies
        run: pip install --no-cache-dir requests

      - name: Fetch raw dataset (needed for the API image's movie catalog)
        run: python src/data/download.py

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

